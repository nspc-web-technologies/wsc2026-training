<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Image Compare</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div>
        <input type="range" min="0" max="100" value="50">
        <img src="./after.jpg">
        <img src="./before.jpg">
    </div>
    <script>
        document.querySelector('input').addEventListener('input', function (e) {
            document.querySelector('div').style.setProperty('--pos', `${e.target.value}%`);
        })
    </script>
</body>

</html>
